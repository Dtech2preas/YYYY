<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DTech Rewards Portal - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-light: #60a5fa;
            --accent: #d4af37;
            --bg: #020617;
            --surface: #0f172a;
            --text-main: #f8fafc;
            --text-light: #94a3b8;
            --danger: #ef4444;
            --success: #10b981;
            --radius: 12px;
            --border: #1e293b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-container {
            background: var(--surface);
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid var(--border);
        }

        h1 {
            color: var(--accent);
            margin-bottom: 5px;
        }

        p {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #1e293b;
            border: 1px solid #334155;
            color: white;
            border-radius: var(--radius);
            box-sizing: border-box;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 10px;
            transition: background 0.2s;
        }

        button:hover {
            background: var(--primary-light);
        }

        .secondary-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-light);
        }

        .secondary-btn:hover {
            border-color: var(--primary);
            color: white;
            background: rgba(59, 130, 246, 0.1);
        }

        #message {
            margin-top: 15px;
            padding: 10px;
            border-radius: var(--radius);
            font-size: 0.9rem;
            display: none;
        }
        .error { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
        .success { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); }
    </style>
</head>
<body>

    <div class="auth-container">
        <h1>D-TECH</h1>
        <p>Access Portal</p>

        <input type="text" id="username" placeholder="Username" />
        <input type="password" id="password" placeholder="Password" />

        <button onclick="login()">Login</button>
        <button class="secondary-btn" onclick="register()">Create Account</button>

        <div id="message"></div>
    </div>

    <script>
        const API_URL = "https://crimson-art-f482.lefa4082.workers.dev"; // Updated to new URL

        function showMessage(msg, type) {
            const el = document.getElementById('message');
            el.textContent = msg;
            el.className = type;
            el.style.display = 'block';
            if(type === 'success') setTimeout(() => el.style.display = 'none', 3000);
        }

        async function login() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            if(!u || !p) return showMessage('Please fill in all fields.', 'error');

            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: u, password: p})
                });
                const data = await res.json();

                if(res.ok) {
                    showMessage('Login successful! Redirecting...', 'success');
                    localStorage.setItem('dtech_user', JSON.stringify({username: u}));
                    setTimeout(() => window.location.href = 'dashboard.html', 1000);
                } else {
                    showMessage(data.error || 'Login failed.', 'error');
                }
            } catch(e) {
                showMessage('Network error.', 'error');
            }
        }

        async function register() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            if(!u || !p) return showMessage('Please fill in all fields.', 'error');

            try {
                const res = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: u, password: p})
                });
                const data = await res.json();

                if(res.ok) {
                    showMessage('Account created! You can now log in.', 'success');
                } else {
                    showMessage(data.error || 'Registration failed.', 'error');
                }
            } catch(e) {
                showMessage('Network error.', 'error');
            }
        }

        // Check if already logged in
        if(localStorage.getItem('dtech_user')) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
