<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin - DTech</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #3b82f6;
            --danger: #ef4444;
            --success: #10b981;
            --border: #e2e8f0;
            --radius: 8px;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        th {
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            margin-right: 5px;
        }

        .btn-edit { background: #e0f2fe; color: #0284c7; }
        .btn-ban { background: #fef3c7; color: #d97706; }
        .btn-unban { background: #dcfce7; color: #15803d; }
        .btn-delete { background: #fee2e2; color: #b91c1c; }

        .banned-row {
            opacity: 0.6;
            background: #f8fafc;
        }

        .back-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2>Admin Console</h2>
            <a href="dashboard.html" class="back-link">Back to App</a>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Points</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="users-list">
                    <tr><td colspan="4">Loading users...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = "https://crimson-art-f482.lefa4082.workers.dev";

        async function loadUsers() {
            try {
                const res = await fetch(`${API_URL}/admin/users`);
                const users = await res.json();

                const tbody = document.getElementById('users-list');
                tbody.innerHTML = '';

                if (users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4">No users found.</td></tr>';
                    return;
                }

                users.forEach(user => {
                    const tr = document.createElement('tr');
                    if (user.is_banned) tr.className = 'banned-row';

                    tr.innerHTML = `
                        <td><strong>${user.username}</strong></td>
                        <td>${user.points}</td>
                        <td>
                            ${user.is_banned ? '<span style="color:#ef4444; font-weight:bold;">Banned</span>' : '<span style="color:#10b981;">Active</span>'}
                        </td>
                        <td>
                            <button class="action-btn btn-edit" onclick="editBalance('${user.username}', ${user.points})">Edit Pts</button>
                            ${user.is_banned
                                ? `<button class="action-btn btn-unban" onclick="userAction('${user.username}', 'unban')">Unban</button>`
                                : `<button class="action-btn btn-ban" onclick="userAction('${user.username}', 'ban')">Ban</button>`
                            }
                            <button class="action-btn btn-delete" onclick="userAction('${user.username}', 'delete')">Delete</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch(e) {
                document.getElementById('users-list').innerHTML = '<tr><td colspan="4" style="color:red;">Error loading users.</td></tr>';
            }
        }

        async function editBalance(username, currentPoints) {
            const newPts = prompt(`Enter new points for ${username}:`, currentPoints);
            if (newPts === null || newPts === "") return;

            const points = parseInt(newPts);
            if (isNaN(points)) return alert("Please enter a valid number.");

            await userAction(username, 'edit_balance', points);
        }

        async function userAction(username, action, value = null) {
            if (action === 'delete') {
                if (!confirm(`Are you sure you want to permanently delete ${username}?`)) return;
            }

            try {
                const res = await fetch(`${API_URL}/admin/action`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username, action, value })
                });

                if (res.ok) {
                    loadUsers(); // refresh table
                } else {
                    const data = await res.json();
                    alert(data.error || "Action failed");
                }
            } catch(e) {
                alert("Network error.");
            }
        }

        // Initialize
        loadUsers();
    </script>
</body>
</html>
