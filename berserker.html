<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Berserker Mode - DTech</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --surface: #0f172a;
            --text-main: #f8fafc;
            --accent: #d4af37;
            --success: #10b981;
            --border: rgba(255, 255, 255, 0.1);
            --radius: 12px;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .points-badge {
            background: rgba(212, 175, 55, 0.15);
            color: var(--accent);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 700;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .ad-card {
            background: var(--surface);
            border: 1px solid var(--accent);
            border-radius: var(--radius);
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.1);
        }

        .ad-card h2 {
            margin-top: 0;
            color: var(--accent);
        }

        .ad-card p {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .watch-btn {
            background: var(--accent);
            color: #020617;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
            text-transform: uppercase;
        }

        .watch-btn:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        .watch-btn:disabled {
            background: #334155;
            color: #94a3b8;
            cursor: not-allowed;
            transform: none;
        }

        .back-link {
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-block;
            margin-top: 20px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--success);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 700;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 2000;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div style="font-weight: 800; font-size: 1.2rem;">BERSERKER</div>
            <div class="points-badge"><span id="points-display">0</span> pts</div>
        </header>

        <div class="ad-card">
            <h2>Watch Ad</h2>
            <p>Click below to open an ad. You will instantly receive 1 point.</p>

            <button id="watch-btn" class="watch-btn" onclick="watchAd()">Watch Ad (+1 pt)</button>
        </div>

        <div style="text-align: center;">
            <a href="dashboard.html" class="back-link">← Back to Dashboard</a>
        </div>
    </div>

    <div id="toast">Point Added!</div>

    <script>
        const API_URL = "https://crimson-art-f482.lefa4082.workers.dev";
        const AD_URL = "https://otieu.com/4/10205357"; // direct URL ad
        const user = JSON.parse(localStorage.getItem('dtech_user'));

        if (!user || !user.username) {
            window.location.href = 'index.html';
        }

        async function updatePointsDisplay() {
            try {
                const res = await fetch(`${API_URL}/user?username=${encodeURIComponent(user.username)}`);
                const data = await res.json();
                if (res.ok) {
                    document.getElementById('points-display').innerText = data.points;
                }
            } catch(e) {
                console.error("Failed to sync points", e);
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.opacity = 1;
            setTimeout(() => t.style.opacity = 0, 3000);
        }

        async function watchAd() {
            const btn = document.getElementById('watch-btn');
            btn.disabled = true;
            btn.innerText = "Processing...";

            // Open the Ad
            window.open(AD_URL, '_blank');

            // Add the point
            try {
                const res = await fetch(`${API_URL}/add-point`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: user.username})
                });
                const data = await res.json();

                if (res.ok) {
                    document.getElementById('points-display').innerText = data.points;
                    showToast('+1 Point Added!');
                } else {
                    alert(data.error || "Failed to add point");
                }
            } catch(e) {
                alert("Network error. Point not added.");
            }

            
            setTimeout(() => {
                btn.disabled = false;
                btn.innerText = "Watch Ad (+1 pt)";
            }, 3000);
        }

        // Initialize
        updatePointsDisplay();
    </script>
</body>
</html>
