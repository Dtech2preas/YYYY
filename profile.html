<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Profile - DTech</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --surface: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --border: rgba(255, 255, 255, 0.1);
            --radius: 12px;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 30px;
            text-align: center;
        }

        .avatar {
            font-size: 4rem;
            margin-bottom: 10px;
        }

        .username {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 5px;
            color: var(--primary);
        }

        .points {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .points span {
            font-weight: 700;
            color: var(--text-main);
        }

        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-block;
            margin-top: 20px;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <div class="avatar">👤</div>
            <div class="username" id="profile-username">User</div>
            <div class="points">Total Points: <span id="profile-points">0</span></div>
        </div>

        <div style="text-align: center;">
            <a href="dashboard.html" class="back-link">← Back to Dashboard</a>
        </div>
    </div>

    <script>
        const API_URL = "https://crimson-art-f482.lefa4082.workers.dev";
        const user = JSON.parse(localStorage.getItem('dtech_user'));

        if (!user || !user.username) {
            window.location.href = 'index.html';
        }

        document.getElementById('profile-username').innerText = user.username;

        async function fetchPoints() {
            try {
                const res = await fetch(`${API_URL}/user?username=${encodeURIComponent(user.username)}`);
                const data = await res.json();

                if (res.ok) {
                    document.getElementById('profile-points').innerText = data.points;
                }
            } catch(e) {
                console.error("Failed to fetch points", e);
            }
        }

        fetchPoints();
    </script>
</body>
</html>
