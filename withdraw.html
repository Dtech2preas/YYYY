<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Withdraw - DTech</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --surface: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --border: rgba(255, 255, 255, 0.1);
            --radius: 12px;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 30px;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            font-size: 1.5rem;
            color: var(--success);
        }

        p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .req-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            border: 1px dashed var(--border);
        }

        .req-box span {
            font-weight: 800;
            color: var(--text-main);
            font-size: 1.2rem;
        }

        .current-bal {
            margin-bottom: 20px;
            font-weight: 600;
        }

        .current-bal span {
            color: var(--success);
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
        }

        button:disabled {
            background: #334155;
            color: #94a3b8;
            cursor: not-allowed;
        }

        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-block;
            margin-top: 20px;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h1>Cash Out</h1>
            <p>Exchange your hard-earned points for rewards.</p>

            <div class="req-box">
                Minimum Withdrawal:<br>
                <span>1000 Points</span>
            </div>

            <div class="current-bal">
                Your Balance: <span id="withdraw-points">0</span> pts
            </div>

            <button id="withdraw-btn" onclick="alert('Withdrawals are currently being processed manually by the Admin.')" disabled>Request Withdrawal</button>
        </div>

        <div style="text-align: center;">
            <a href="dashboard.html" class="back-link">← Back to Dashboard</a>
        </div>
    </div>

    <script>
        const API_URL = "https://crimson-art-f482.lefa4082.workers.dev";
        const user = JSON.parse(localStorage.getItem('dtech_user'));

        if (!user || !user.username) {
            window.location.href = 'index.html';
        }

        async function fetchPoints() {
            try {
                const res = await fetch(`${API_URL}/user?username=${encodeURIComponent(user.username)}`);
                const data = await res.json();

                if (res.ok) {
                    const points = data.points;
                    document.getElementById('withdraw-points').innerText = points;

                    const btn = document.getElementById('withdraw-btn');
                    if (points >= 1000) {
                        btn.disabled = false;
                        btn.innerText = "Request Withdrawal";
                    } else {
                        btn.disabled = true;
                        btn.innerText = "Not Enough Points";
                    }
                }
            } catch(e) {
                console.error("Failed to fetch points", e);
            }
        }

        fetchPoints();
    </script>
</body>
</html>
